# Required GitHub secrets:
#   AWS_ACCESS_KEY_ID          — IAM user with S3 write + CloudFront invalidation + Lambda update permissions
#   AWS_SECRET_ACCESS_KEY      — corresponding secret key
#   DEMO_SSH_KEY               — PEM private key for ubuntu@forwardforecasting.eu (deploys demo site)
#   PLAY_SERVICE_ACCOUNT_JSON  — Google service account JSON key (play-uploader@photo-visor.iam.gserviceaccount.com)
#   ANDROID_KEYSTORE_BASE64    — base64 of android/app/upload-keystore.jks (run: base64 -w0 upload-keystore.jks)
#   ANDROID_KEY_PASSWORD       — keystore + key password (photovisor_upload)

name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION:        eu-west-1
  S3_BUCKET:         photo-visor-295936871972
  CLOUDFRONT_ID:     E2JW5PYKNPPYOB
  LAMBDA_FUNCTION:   photo-visor-exif-processor

jobs:

  # ── Detect which paths changed ──────────────────────────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      lambda:   ${{ steps.filter.outputs.lambda }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            lambda:
              - 'lambdas/**'

  # ── Frontend: build → S3 → CloudFront invalidation ─────────────────────────
  frontend:
    name: Build and deploy frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build
        working-directory: frontend
        run: |
          npm ci
          BASE_URL=/app/ NODE_OPTIONS=--experimental-global-webcrypto npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Sync hashed assets (long cache)
        run: |
          aws s3 sync frontend/dist s3://${{ env.S3_BUCKET }}/app/ \
            --delete \
            --exclude "index.html" \
            --cache-control "max-age=31536000,immutable"

      - name: Sync index.html (no cache)
        run: |
          aws s3 cp frontend/dist/index.html \
            s3://${{ env.S3_BUCKET }}/app/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_ID }} \
            --paths "/app/*"
          echo "✓ Frontend deployed at $(date -u)"

      - name: Verify no white page (asset paths)
        run: |
          sleep 10
          URL="https://fotos.forwardforecasting.eu/app/index.html"
          aws s3 cp s3://${{ env.S3_BUCKET }}/app/index.html - | grep -q 'src="/app/' \
            || (echo "❌ Wrong asset paths in index.html — white page risk!" && exit 1)
          echo "✅ Asset paths verified"

  # ── Demo: build → rsync to VPS nginx ──────────────────────────────────────
  demo:
    name: Build and deploy demo
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build demo
        working-directory: frontend
        run: |
          npm ci
          npm run build:demo

      - name: Deploy to VPS
        run: |
          echo "${{ secrets.DEMO_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          rsync -az --delete \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            frontend/dist-demo/ \
            ubuntu@forwardforecasting.eu:/var/www/forwardforecasting/photo-visor/
          rm /tmp/deploy_key
          echo "✓ Demo deployed at $(date -u)"

  # ── Android: build AAB → upload to Play internal testing ──────────────────
  android:
    name: Build and publish Android
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build web assets
        working-directory: frontend
        run: |
          npm ci
          NODE_OPTIONS=--experimental-global-webcrypto npm run build

      - name: Sync to Android
        working-directory: frontend
        run: npx cap sync android

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d \
            > frontend/android/app/upload-keystore.jks

      - name: Set versionCode and versionName
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          VERSION_NAME=$(node -p "require('./frontend/package.json').version")
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" frontend/android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION_NAME\"/" frontend/android/app/build.gradle
          echo "versionCode=$VERSION_CODE, versionName=$VERSION_NAME"

      - name: Build release AAB
        working-directory: frontend/android
        run: ./gradlew bundleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload to Play Store (internal testing)
        env:
          PLAY_KEY_FILE: /tmp/play-key.json
        run: |
          pip install --quiet google-api-python-client google-auth
          echo '${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}' > /tmp/play-key.json
          python3 scripts/ci-upload-play.py
          rm /tmp/play-key.json

  # ── Lambda: build package → zip → update function code ─────────────────────
  lambda:
    name: Deploy Lambda
    needs: changes
    if: needs.changes.outputs.lambda == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Build and deploy
        working-directory: lambdas/exif-processor
        run: |
          pip3 install -r requirements.txt --target package --quiet
          cp index.py package/
          cd package && zip -r ../function.zip . -q
          cd ..
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --zip-file fileb://function.zip \
            --query "FunctionName" --output text
          echo "✓ Lambda deployed at $(date -u)"
